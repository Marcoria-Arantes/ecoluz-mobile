<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLuz Dashboard - Painel Residencial</title>
    <!-- Tailwind CSS para estilização de alto nível -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- Container Estilo Dashboard Premium (Layout idêntico à referência de tela) -->
    <div class="bg-slate-900 border border-slate-800/80 rounded-3xl p-6 w-full max-w-6xl shadow-2xl grid grid-cols-1 lg:grid-cols-12 gap-8 my-4 relative overflow-hidden">
        
        <!-- SIDEBAR ESQUERDA: Configurações, Busca e Resultados (Ocupa 4 colunas) -->
        <div class="lg:col-span-4 space-y-6 flex flex-col justify-between border-r border-slate-800/40 lg:pr-4">
            
            <div class="space-y-6">
                <!-- Header do Painel -->
                <header class="flex items-center gap-3">
                    <div class="p-2.5 bg-indigo-500/10 rounded-xl text-indigo-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.003 9.003 0 1020.945 13H11V3.055z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">EcoLuz Analytics</h1>
                        <p class="text-slate-500 text-xs">Monitoramento Residencial</p>
                    </div>
                </header>

                <hr class="border-slate-800/60">

                <!-- BUSCA COMPLETA DE MUNICÍPIOS (Integração IBGE) -->
                <div class="space-y-2 relative">
                    <div class="flex justify-between items-center">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Buscar Município (Todo o Brasil)</label>
                        <!-- Indicador de carregamento da API -->
                        <span id="status-api" class="text-[10px] text-amber-500 font-medium flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> Conectando IBGE...
                        </span>
                    </div>
                    <div class="relative">
                        <input type="text" id="busca-cidade" disabled placeholder="Carregando cidades..." class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
                    </div>
                    
                    <!-- Dropdown de Autocomplete -->
                    <div id="lista-sugestoes" class="hidden absolute left-0 right-0 top-full mt-1 bg-slate-950 border border-slate-800 rounded-xl shadow-2xl max-h-52 overflow-y-auto z-50 divide-y divide-slate-900/60 scrollbar-thin scrollbar-thumb-slate-800">
                        <!-- Cidades do Brasil filtradas entram via JS -->
                    </div>
                </div>

                <!-- BANDEIRA TARIFÁRIA -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Bandeira ANEEL Vigente</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" onclick="mudarBandeira('VERDE')" id="btn-VERDE" class="bandeira-btn py-2 text-xs font-bold rounded-xl border border-transparent transition bg-emerald-500 text-slate-950 shadow-md">Verde</button>
                        <button type="button" onclick="mudarBandeira('AMARELA')" id="btn-AMARELA" class="bandeira-btn py-2 text-xs font-bold rounded-xl border border-slate-800 bg-slate-950 text-slate-400">Amarela</button>
                        <button type="button" onclick="mudarBandeira('VERMELHA_1')" id="btn-VERMELHA_1" class="bandeira-btn py-2 text-xs font-bold rounded-xl border border-slate-800 bg-slate-950 text-slate-400">Vermelha 1</button>
                        <button type="button" onclick="mudarBandeira('VERMELHA_2')" id="btn-VERMELHA_2" class="bandeira-btn py-2 text-xs font-bold rounded-xl border border-slate-800 bg-slate-950 text-slate-400">Vermelha 2</button>
                    </div>
                </div>
            </div>

            <!-- CARD DE EXIBIÇÃO DE RESULTADOS -->
            <div class="space-y-3 pt-6 lg:pt-0">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-700 rounded-2xl p-5 text-center shadow-xl relative overflow-hidden">
                    <span class="text-xs font-medium text-indigo-200 uppercase tracking-widest block mb-1">Previsão da Fatura</span>
                    <div class="text-4xl font-extrabold tracking-tight" id="resultado-preco">R$ 0,00</div>
                    <span class="text-xs text-indigo-200/80 block mt-1" id="total-kwh">0.0 kWh total</span>
                </div>

                <div class="bg-slate-950 border border-slate-800/60 rounded-2xl p-4 text-xs space-y-1">
                    <div class="flex items-start gap-2.5">
                        <span class="text-indigo-400">📍</span>
                        <p class="text-slate-300 font-medium" id="localidade-ativa">Localidade: São Paulo (SP)</p>
                    </div>
                    <p class="text-[11px] text-slate-500 pl-5" id="detalhe-tarifa">Carregando dados da distribuidora regional...</p>
                </div>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL: Grid Multi-Colunas de Eletrodomésticos (Ocupa 8 colunas) -->
        <div class="lg:col-span-8 space-y-6 max-h-[80vh] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-slate-800">
            <div id="container-categorias" class="space-y-8">
                <!-- Injeção dos blocos de cômodos via script.js -->
            </div>
        </div>

    </div>

    <!-- Vinculando o arquivo JavaScript separado -->
    <script src="js/script.js"></script>
</body>
</html>
