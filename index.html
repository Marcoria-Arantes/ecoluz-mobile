<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoLuz Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Esconde a barra de rolagem mas mantém o scroll funcionando (aparência mais clean) */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
        
        /* Efeito de vidro temperado para barra inferior */
        .glass-panel {
            background: rgba(2, 6, 23, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans min-h-screen relative pb-40">

    <header class="pt-10 pb-6 px-6 bg-gradient-to-b from-indigo-900/20 to-transparent">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <span class="text-xl">⚡</span>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white">EcoLuz</h1>
                <p class="text-slate-400 text-xs">Simulador Residencial</p>
            </div>
        </div>

        <div class="relative z-50">
            <div class="flex justify-between items-center mb-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Localidade</label>
                <span id="status-api" class="text-[10px] text-amber-500 font-medium flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> Conectando...
                </span>
            </div>
            <div class="relative bg-slate-900/80 rounded-2xl border border-slate-800 shadow-inner focus-within:border-indigo-500 transition-colors">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">📍</span>
                <input type="text" id="busca-cidade" disabled placeholder="Buscando base de dados..." class="w-full bg-transparent pl-12 pr-4 py-3.5 text-sm text-slate-200 focus:outline-none disabled:opacity-50">
            </div>
            <div id="lista-sugestoes" class="hidden absolute left-0 right-0 top-full mt-2 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl max-h-48 overflow-y-auto divide-y divide-slate-700/50">
                </div>
        </div>
    </header>

    <main class="px-5 space-y-8">
        
        <section>
            <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-3 pl-1">Bandeira Atual</h3>
            <div class="flex gap-3 overflow-x-auto pb-2 snap-x">
                <button type="button" onclick="mudarBandeira('VERDE')" id="btn-VERDE" class="bandeira-btn snap-center flex-shrink-0 px-6 py-2.5 rounded-full text-xs font-bold transition bg-emerald-500 text-slate-950 shadow-lg shadow-emerald-500/20">Verde</button>
                <button type="button" onclick="mudarBandeira('AMARELA')" id="btn-AMARELA" class="bandeira-btn snap-center flex-shrink-0 px-6 py-2.5 rounded-full border border-slate-800 bg-slate-900/50 text-slate-400 text-xs font-bold">Amarela</button>
                <button type="button" onclick="mudarBandeira('VERMELHA_1')" id="btn-VERMELHA_1" class="bandeira-btn snap-center flex-shrink-0 px-6 py-2.5 rounded-full border border-slate-800 bg-slate-900/50 text-slate-400 text-xs font-bold">Vermelha 1</button>
                <button type="button" onclick="mudarBandeira('VERMELHA_2')" id="btn-VERMELHA_2" class="bandeira-btn snap-center flex-shrink-0 px-6 py-2.5 rounded-full border border-slate-800 bg-slate-900/50 text-slate-400 text-xs font-bold">Vermelha 2</button>
            </div>
        </section>

        <div id="container-categorias" class="space-y-6"></div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 glass-panel border-t border-slate-800/80 p-5 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.4)] z-40">
        <div class="flex justify-between items-end mb-1">
            <span class="text-xs font-medium text-slate-400 uppercase tracking-widest">Previsão Mensal</span>
            <span class="text-xs font-bold text-indigo-400" id="total-kwh">0.0 kWh</span>
        </div>
        <div class="flex justify-between items-center">
            <div class="text-4xl font-extrabold text-white tracking-tight" id="resultado-preco">R$ 0,00</div>
            
            <button class="bg-indigo-500 hover:bg-indigo-400 text-white p-3.5 rounded-2xl shadow-lg shadow-indigo-500/25 transition-transform active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>
        <p class="text-[10px] text-slate-500 mt-2 text-center" id="detalhe-tarifa">Aguardando seleção de cidade...</p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
